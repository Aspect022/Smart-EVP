# SmartEVP+ — Mosquitto MQTT Broker Config
# Location: C:\Program Files\mosquitto\mosquitto.conf
# 
# HOW TO APPLY:
# 1. Copy this file to C:\Program Files\mosquitto\mosquitto.conf
#    (overwrite or append these lines to existing file)
# 2. Open "Services" app (Win+R → services.msc)
# 3. Find "Mosquitto Broker" → Right-click → Restart
# 4. Verify: open PowerShell and run the test commands below

# ── Listener ──────────────────────────────────────────────────
# Listen on port 1883, all local interfaces
listener 1883

# ── Authentication ───────────────────────────────────────────
# Allow connections without username/password (local dev only)
allow_anonymous true

# ── Logging ──────────────────────────────────────────────────
log_type error
log_type warning
log_type notice
log_type information
log_dest stdout

# ── Limits ───────────────────────────────────────────────────
max_connections 50
max_queued_messages 100

# ── Persistence ──────────────────────────────────────────────
persistence false
